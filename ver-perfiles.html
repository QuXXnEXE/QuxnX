<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfiles</title>

<style>
body{
    background:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    width:650px;
    height:420px;
    background:#f1f1f1;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    padding:30px;
}

h1{
    text-align:center;
}

.grid{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
    justify-items:center;
}

.perfil{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    background:white;
}
</style>
</head>

<body>

<div class="box">
    <h1>Perfiles</h1>

    <div class="grid" id="grid"></div>
</div>

<script>
let grid = document.getElementById("grid");

// foto guardada del usuario actual
let pfp = localStorage.getItem("pfp");

// si no existe usa estrella por defecto
if(!pfp){
    pfp="https://cdn-icons-png.flaticon.com/512/616/616490.png";
}

// crear tarjeta de perfil
let img=document.createElement("img");
img.src=pfp;
img.className="perfil";

grid.appendChild(img);
</script>

</body>
</html>
