<script>
// sonido meow
const meow = new Audio("https://www.fesliyanstudios.com/play-mp3/387");

// nombre usuario
let user = localStorage.getItem("currentUser");
document.getElementById("nombreUsuario").innerText = user;

// permisos
if(user === "Queen Ankarian"){
    document.getElementById("permisoTexto").innerText = "Cuenta del creador 👑";
}else{
    document.getElementById("permisoTexto").innerText = "Usuario normal";
}

// FOTO PERFIL
let savedPfp = localStorage.getItem("pfp");
if(savedPfp) document.getElementById("pfp").src = savedPfp;

document.getElementById("pfpInput").onchange = function(){
    let reader = new FileReader();
    reader.onload = e => {
        localStorage.setItem("pfp", e.target.result);
        document.getElementById("pfp").src = e.target.result;
        meow.play();
    }
    reader.readAsDataURL(this.files[0]);
};

// LISTA DE IMAGENES DECORATIVAS
let decorList = JSON.parse(localStorage.getItem("decorList") || "[]");
let box = document.getElementById("box");

// CREAR imagen decorativa en pantalla
function createDecor(imgData,x=50,y=50){
    let img = document.createElement("img");
    img.src = imgData;
    img.className = "decoracion";
    img.style.left = x+"px";
    img.style.top = y+"px";
    box.appendChild(img);

    // mover
    let dragging=false;
    img.onmousedown = ()=> dragging=true;
    document.onmouseup = ()=> dragging=false;
    document.onmousemove = e=>{
        if(!dragging) return;
        let rect = box.getBoundingClientRect();
        let nx = e.clientX - rect.left - 60;
        let ny = e.clientY - rect.top - 60;
        img.style.left = nx+"px";
        img.style.top = ny+"px";
        saveAllDecor();
    };

    // TRIPLE CLICK = BORRAR
    img.onclickCount=0;
    img.onclick = ()=>{
        img.onclickCount++;
        setTimeout(()=>img.onclickCount=0,500);
        if(img.onclickCount===3){
            img.remove();
            saveAllDecor();
        }
    };
}

// cargar imágenes guardadas
decorList.forEach(d=>createDecor(d.img,d.x,d.y));

// guardar todas
function saveAllDecor(){
    let arr=[];
    document.querySelectorAll(".decoracion").forEach(img=>{
        arr.push({
            img: img.src,
            x: parseInt(img.style.left)||50,
            y: parseInt(img.style.top)||50
        });
    });
    localStorage.setItem("decorList",JSON.stringify(arr));
}

// subir nuevas decoraciones ilimitadas
document.getElementById("decorInput").onchange = function(){
    let reader = new FileReader();
    reader.onload = e => {
        createDecor(e.target.result,100,100);
        saveAllDecor();
        meow.play();
    }
    reader.readAsDataURL(this.files[0]);
};
</script>
