<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel</title>

<style>
body{
  margin:0;
  height:100vh;
  background:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:#f2f2f2;
  padding:60px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

button{
  display:block;
  width:260px;
  margin:15px auto;
  padding:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#d4af37,#f1d77a);
  font-weight:bold;
  cursor:pointer;
}
.admin{
  margin-top:30px;
  padding:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h1>¿Qué hacer hoy?</h1>

  <button>Explorar Star-versos</button>
  <button>Biblioteca de personajes</button>

  <div id="adminPanel" class="admin"></div>
</div>

<script>
let user = localStorage.getItem("currentUser");

if(user === "Queen Ankarian"){
  document.getElementById("adminPanel").innerHTML =
  "Cuenta del creador detectada 👑<br>Puedes crear Archiveros";
}
</script>

</body>
</html>

<button>Explorar Star-versos</button>
<button>Biblioteca de personajes</button>
<button>Ver perfiles de otros</button>
<button onclick="location.href='perfil.html'">Mi perfil</button>
