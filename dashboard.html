<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel</title>

<style>
body{
    background:white;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.panel{
    background:#f1f1f1;
    padding:50px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
    width:650px;
}

h1{
    margin-bottom:40px;
}

.botones{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

button{
    padding:18px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#caa43b,#f3d87a);
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="panel">
    <h1>¿Qué hacer hoy?</h1>

    <div class="botones">
        <button onclick="location.href='universos.html'">Explorar Star-versos</button>
        <button onclick="location.href='personajes.html'">Biblioteca de personajes</button>
        <button onclick="location.href='perfiles.html'">Ver perfiles de otros</button>
        <button onclick="location.href='perfil.html'">Mi perfil</button>
    </div>
</div>

</body>
</html>
