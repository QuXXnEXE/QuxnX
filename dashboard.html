<!DOCTYPE html>
<html>
<head>
<title>Panel</title>

<style>
body{
    margin:0;
    background:white;
    font-family:Arial;
}

/* CUADRO CENTRAL */
.panel{
    width:600px;
    height:380px;
    background:#eeeeee;
    border-radius:25px;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
    
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:40px;
}

/* TITULO */
h1{
    margin-top:0;
}

/* CONTENEDOR BOTONES */
.botones{
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* BOTONES */
button{
    padding:18px;
    border:none;
    border-radius:12px;
    background:linear-gradient(to right,#caa63a,#f1d87a);
    font-size:16px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="panel">
    <h1>¿Qué hacer hoy?</h1>

    <div class="botones">
        <button onclick="location.href='universos.html'">Explorar Star-versos</button>
        <button onclick="location.href='personajes.html'">Biblioteca de personajes</button>
        <button onclick="location.href='perfiles.html'">Ver perfiles de otros</button>
        <button onclick="location.href='perfil.html'">Mi perfil</button>
    </div>
</div>

</body>
</html>
