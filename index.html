<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Archivador de Starversos</title>

<style>
body{
  margin:0;
  height:100vh;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, Helvetica, sans-serif;
}

.box{
  background:#f2f2f2;
  padding:60px 70px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

h1{
  margin-bottom:40px;
  color:#333;
}

button{
  display:block;
  width:220px;
  padding:14px;
  margin:15px auto;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#d4af37,#f1d77a);
  color:#222;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="box">
  <h1>Archivador</h1>
  <button onclick="location.href='login.html'">Iniciar sesión</button>
  <button onclick="location.href='register.html'">Crear sesión</button>
</div>

</body>
</html>
